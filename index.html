<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Savings Tracker</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
        background: linear-gradient(135deg, #0b0c10, #111827, #0b0c10);
        color: #c5c6c7;
        overflow-y: auto;
      }

      .container {
        width: 100%;
        max-width: 950px;
        padding: 35px;
        border-radius: 35px;

        background: rgba(31, 40, 51, 0.88);

        backdrop-filter: blur(25px);

        border: 1px solid rgba(102, 252, 241, 0.12);

        box-shadow: 0 0 45px rgba(102, 252, 241, 0.08);
      }
      .card:hover,
      .moneyBox:hover {
        transform: translateY(-4px);

        transition: 0.3s;

        box-shadow: 0 0 25px rgba(102, 252, 241, 0.15);
      }
      .history h2 {
        text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .title h1 {
        font-size: 42px;
        color: #66fcf1;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .title p {
        margin-top: 10px;
        color: #c5c6c7;
        opacity: 0.8;
      }

      .goalBox {
        width: 220px;
        padding: 18px;
        border-radius: 25px;

        background: rgba(69, 162, 158, 0.12);

        border: 1px solid rgba(102, 252, 241, 0.15);
      }

      .goalBox p {
        font-size: 13px;
        color: #66fcf1;
        margin-bottom: 10px;
      }

      .goalBox input,
      .edit input,
      .addMoney input {
        width: 100%;
        padding: 14px;

        border-radius: 15px;

        background: #0b0c10;

        border: 1px solid #45a29e;

        color: #c5c6c7;

        outline: none;
      }

      .goalBox input:focus,
      .edit input:focus,
      .addMoney input:focus {
        border-color: #66fcf1;

        box-shadow: 0 0 18px rgba(102, 252, 241, 0.3);
      }

      .moneyBox {
        margin-top: 35px;
        padding: 30px;
        border-radius: 30px;

        background: #1f2833;

        border: 1px solid rgba(102, 252, 241, 0.1);
      }

      .moneyBox p {
        color: #c5c6c7;
      }

      .money {
        font-size: 72px;
        font-weight: bold;
        margin-top: 8px;

        color: #66fcf1;

        text-shadow: 0 0 20px rgba(102, 252, 241, 0.35);
      }

      .progressText {
        display: flex;
        justify-content: space-between;
        margin-top: 25px;
        font-size: 14px;
      }

      .progress {
        margin-top: 10px;
        height: 20px;

        background: #0b0c10;

        border-radius: 30px;
        overflow: hidden;
      }

      .fill {
        height: 100%;
        width: 0;

        background: linear-gradient(90deg, #45a29e, #66fcf1);

        border-radius: 30px;

        box-shadow: 0 0 20px #66fcf1;
      }

      .edit,
      .addMoney {
        display: flex;
        gap: 12px;
        margin-top: 25px;
      }

      .edit button,
      .addMoney button {
        padding: 18px 28px;

        border: none;

        border-radius: 18px;

        font-weight: bold;

        cursor: pointer;

        background: linear-gradient(90deg, #45a29e, #66fcf1);

        color: #0b0c10;

        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-2px);

        box-shadow: 0 0 25px rgba(102, 252, 241, 0.35);
      }

      #withdrawBtn {
        background: linear-gradient(90deg, #243b55, #141e30);

        color: #66fcf1;
      }

      .stats {
        display: grid;

        grid-template-columns: repeat(3, 1fr);

        gap: 15px;

        margin-top: 25px;
      }

      .card {
        padding: 22px;

        border-radius: 25px;

        background: rgba(11, 12, 16, 0.65);

        border: 1px solid rgba(102, 252, 241, 0.08);
      }

      .card p {
        font-size: 14px;
      }

      .card h2 {
        margin-top: 10px;
        font-size: 28px;
        color: #66fcf1;
      }

      .history {
        margin-top: 35px;
      }

      .history h2 {
        margin-bottom: 15px;
        font-size: 28px;
        color: #66fcf1;
      }

      #historyList {
        max-height: 250px;

        overflow-y: auto;

        display: flex;

        flex-direction: column;

        gap: 10px;
      }

      .item {
        padding: 18px;

        border-radius: 20px;

        background: rgba(11, 12, 16, 0.6);

        display: flex;

        justify-content: space-between;

        align-items: center;

        border-left: 4px solid #66fcf1;

        transition: 0.3s;
      }

      .item:hover {
        transform: translateY(-2px);

        background: rgba(31, 40, 51, 1);
      }

      @media (max-width: 768px) {
        .container {
          padding: 20px;
          border-radius: 25px;
        }

        .top {
          flex-direction: column;
          gap: 20px;
          align-items: stretch;
        }

        .goalBox {
          width: 100%;
        }

        .money {
          font-size: 48px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .addMoney,
        .edit {
          flex-direction: column;
        }

        .addMoney button,
        .edit button {
          width: 100%;
        }

        .item {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <div class="title">
          <h1>Savings Tracker</h1>

          <p>Track your savings with ease</p>
        </div>

        <div class="goalBox">
          <p>Goal Amount</p>

          <input id="goalInput" value="20000" type="number" />
        </div>
      </div>

      <div class="moneyBox">
        <p>Current Savings</p>

        <div class="money" id="money">₹0</div>

        <div class="progressText">
          <span>Progress</span>

          <span id="percent">0%</span>
        </div>

        <div class="progress">
          <div class="fill" id="fill"></div>
        </div>

        <div class="edit">
          <input
            id="editInput"
            placeholder="Edit savings amount"
            type="number"
          />

          <button id="updateBtn">Update</button>
        </div>
      </div>

      <div class="stats">
        <div class="card">
          <p>Saved Today</p>

          <h2 id="saved">₹0</h2>
        </div>

        <div class="card">
          <p>Remaining</p>

          <h2 id="remaining">₹20,000</h2>
        </div>

        <div class="card">
          <p>Total Days</p>

          <h2 id="days">0</h2>
        </div>
      </div>

      <div class="addMoney">
        <input id="amountInput" placeholder="Enter amount ₹" />

        <button id="addBtn">+ Add Money</button>

        <button id="withdrawBtn">- Withdraw</button>
      </div>

      <div class="history">
        <h2>History</h2>

        <div id="historyList"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
