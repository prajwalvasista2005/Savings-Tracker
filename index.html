<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Savings Tracker</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, sans-serif;
      }

      body {
        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        padding: 30px;

        background: linear-gradient(135deg, #020617, #0f172a, #1e293b);

        color: white;

        overflow-y: auto;
      }

      .container {
        width: 100%;
        max-width: 950px;

        padding: 35px;

        border-radius: 35px;

        background: rgba(255, 255, 255, 0.06);

        backdrop-filter: blur(30px);

        border: 1px solid rgba(255, 255, 255, 0.08);

        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
      }

      .top {
        display: flex;

        justify-content: space-between;

        align-items: center;
      }

      .title h1 {
        font-size: 42px;
      }

      .title p {
        margin-top: 10px;

        color: #9ca3af;
      }

      .goalBox {
        width: 220px;

        padding: 18px;

        border-radius: 25px;

        background: rgba(34, 197, 94, 0.15);

        border: 1px solid rgba(34, 197, 94, 0.15);
      }

      .goalBox p {
        font-size: 13px;

        color: #86efac;

        margin-bottom: 10px;
      }

      .goalBox input {
        width: 100%;

        padding: 14px;

        border: none;

        outline: none;

        border-radius: 15px;

        background: #111827;

        color: white;

        font-size: 18px;
      }

      .moneyBox {
        margin-top: 35px;

        padding: 30px;

        border-radius: 30px;

        background: rgba(255, 255, 255, 0.04);

        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .moneyBox p {
        color: #f6f8fc;
      }

      .money {
        font-size: 72px;

        font-weight: bold;

        margin-top: 8px;
      }

      .progressText {
        display: flex;

        justify-content: space-between;

        margin-top: 25px;

        font-size: 14px;

        color: #fbfbfb;
      }

      .progress {
        margin-top: 10px;

        height: 20px;

        background: #ffffff;

        border-radius: 30px;

        overflow: hidden;
      }

      .fill {
        height: 100%;

        width: 11%;

        background: linear-gradient(90deg, #1eb1cb, #3b82f6, #684da5);

        border-radius: 30px;
      }

      .edit {
        display: flex;

        gap: 12px;

        margin-top: 25px;
      }

      .edit input {
        flex: 1;

        padding: 15px;

        border: none;

        outline: none;

        background: #111827;

        color: white;

        border-radius: 16px;
      }

      .edit button {
        padding: 15px 22px;

        border: none;

        cursor: pointer;

        border-radius: 16px;

        font-weight: bold;

        background: linear-gradient(90deg, #1eb1cb, #3b82f6, #684da5);

        color: white;
      }

      .stats {
        display: grid;

        grid-template-columns: repeat(3, 1fr);

        gap: 15px;

        margin-top: 25px;
      }

      .card {
        padding: 22px;

        border-radius: 25px;

        background: rgba(255, 255, 255, 0.04);

        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .card p {
        font-size: 14px;

        color: #ffffff;
      }

      .card h2 {
        margin-top: 10px;

        font-size: 28px;
      }

      .addMoney {
        display: flex;

        gap: 12px;

        margin-top: 30px;
      }

      .addMoney input {
        flex: 1;

        padding: 18px;

        border: none;

        outline: none;

        border-radius: 18px;

        background: #111827;

        color: white;
      }

      .addMoney button {
        padding: 18px 28px;

        border: none;

        border-radius: 18px;

        font-weight: bold;

        cursor: pointer;

        background: linear-gradient(90deg, #1eb1cb, #3b82f6, #684da5);

        color: white;
      }

      #historyList {
        margin-top: 15px;

        display: flex;

        flex-direction: column;

        gap: 10px;
      }

      .item {
        padding: 18px;

        border-radius: 20px;

        background: rgba(255, 255, 255, 0.04);

        display: flex;

        justify-content: space-between;

        align-items: center;
      }
      .history {
        margin-top: 35px;
      }

      .history h2 {
        margin-bottom: 15px;

        font-size: 28px;
      }

      #historyList {
        max-height: 250px;

        overflow-y: auto;

        padding-right: 4px;
      }

      #historyList::-webkit-scrollbar {
        width: 6px;
      }

      #historyList::-webkit-scrollbar-thumb {
        background: #475569;

        border-radius: 20px;
      }

      .item:hover {
        transform: translateY(-2px);

        background: rgba(255, 255, 255, 0.08);

        transition: 0.3s;
      }
      #withdrawBtn {
        background: linear-gradient(90deg, #ef4444, #dc2626);
      }
      @media (max-width: 768px) {
        .container {
          padding: 20px;

          border-radius: 25px;
        }

        .top {
          flex-direction: column;

          gap: 20px;

          align-items: stretch;
        }

        .goalBox {
          width: 100%;
        }

        .money {
          font-size: 48px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .addMoney {
          flex-direction: column;
        }

        .edit {
          flex-direction: column;
        }

        .addMoney button,
        .edit button {
          width: 100%;
        }

        .history h2 {
          font-size: 24px;
        }

        .item {
          flex-direction: column;

          gap: 8px;

          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <div class="title">
          <h1>Savings Tracker</h1>

          <p>Track your savings with ease</p>
        </div>

        <div class="goalBox">
          <p>Goal Amount</p>

          <input id="goalInput" value="20000" type="number" />
        </div>
      </div>

      <div class="moneyBox">
        <p>Current Savings</p>

        <div class="money" id="money">₹0</div>

        <div class="progressText">
          <span>Progress</span>

          <span id="percent">0%</span>
        </div>

        <div class="progress">
          <div class="fill" id="fill"></div>
        </div>

        <div class="edit">
          <input
            id="editInput"
            placeholder="Edit savings amount"
            type="number"
          />

          <button id="updateBtn">Update</button>
        </div>
      </div>

      <div class="stats">
        <div class="card">
          <p>Saved Today</p>

          <h2 id="saved">₹0</h2>
        </div>

        <div class="card">
          <p>Remaining</p>

          <h2 id="remaining">₹20,000</h2>
        </div>

        <div class="card">
          <p>Total Days</p>

          <h2 id="days">0</h2>
        </div>
      </div>

      <div class="addMoney">
        <input id="amountInput" placeholder="Enter amount ₹" />

        <button id="addBtn">+ Add Money</button>

        <button id="withdrawBtn">- Withdraw</button>
      </div>

      <div class="history">
        <h2>History</h2>

        <div id="historyList"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
